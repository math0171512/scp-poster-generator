name: learn-github-actions
run-name: "Pushing to website"
on: [push]

permissions:
  contents: write

jobs:
  push-to-website:
    runs-on: ubuntu-latest
    steps:
        - run: |
            git clone https://github.com/math0171512/scp-poster-generator.git files
            git clone https://x-access-token:${{ secrets.PAT }}@github.com/math0171512/math0171512.github.io.git target

            echo "Cloned both repos"

            cd target
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            shopt -s dotglob
            cp -r ../files/src/. .
            cp ../files/LICENSE .

            echo "Replaced files"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            echo "Added authentication"

            git add .

            echo "Added files"

            git commit -m "update" || echo nothing to commit

            echo "Commited"

            git push --force

            echo "yup all works great job team"