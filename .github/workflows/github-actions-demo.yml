name: learn-github-actions
run-name: ${{ github.actor }} is learning GitHub Actions
on: [push]
jobs:
  check-bats-version:
    runs-on: ubuntu-latest
    steps:
        - run: |
            git clone https://github.com/math0171512/scp-poster-generator.git files
            git clone https://github.com/math0171512/math0171512.github.io target
            cd target
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            shopt -s dotglob
            cp -r ../files/src/. .
            cp ../files/LICENSE .
            git add .
            git commit -m "update" || echo nothing to commit
            git push --force